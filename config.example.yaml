agent:
  api_key: "sk-..."
  base_url: "https://openrouter.ai/api/v1"
  model: "meta-llama/llama-3.1-8b-instruct"
  timeout_seconds: 90

run:
  data_dir: "data"
  output_dir: "output"
  weather_file: "weather_central.csv"
  dry_run: true
  force_cache: false
  max_poi_rows: null
  forecast_start: "2022-09-09 00:00:00"
  horizon_days: 6
  history_days: 7
  validation_days: 1
  zones:
    - "102"
  forecast_model: "timefm"
  timefm_repo: "google/timesfm-2.5-200m-pytorch"
  timefm_context_hours: 168
  timefm_step_horizon: 24
  timefm_exog_cols:
    - "T"
    - "U"
    - "nRAIN"
    - "e_price"
    - "is_weekend"
    - "temp_price_idx"
  timefm_diurnal_blend_alpha: 1.0
  timefm_roll_actuals: true
  temperature: 0.2
