agent:
  api_key: "sk-..."
  base_url: "https://openrouter.ai/api/v1"
  model: "meta-llama/llama-3.1-8b-instruct"
  timeout_seconds: 90

run:
  data_dir: "data"
  output_dir: "output"
  weather_file: "weather_central.csv"
  dry_run: true
  force_cache: false
  max_poi_rows: null
  forecast_start: "2022-09-09 00:00:00"
  horizon_days: 6
  history_days: 7
  validation_days: 1
  zones:
    - "102"
  forecast_model: "timesfm"
  timesfm_repo: "google/timesfm-2.5-200m-pytorch"
  timesfm_context_hours: 168
  timesfm_step_horizon: 24
  timesfm_exog_cols:
    - "T"
    - "U"
    - "nRAIN"
    - "e_price"
    - "is_weekend"
    - "temp_price_idx"
  timesfm_diurnal_blend_alpha: 1.0
  timesfm_roll_actuals: true
  chronos_repo: "amazon/chronos-2"
  chronos_context_hours: 512
  chronos_step_horizon: 24
  chronos_num_samples: 20
  chronos_device: "auto"
  chronos_roll_actuals: true
  temperature: 0.2
