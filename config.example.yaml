agent:
  api_key: "sk-..."
  base_url: "https://openrouter.ai/api/v1"
  model: "meta-llama/llama-3.1-8b-instruct"
  timeout_seconds: 90

run:
  data_dir: "data"
  output_dir: "output"
  weather_file: "weather_central.csv"
  dry_run: true
  force_cache: false
  max_poi_rows: null
  forecast_start: "2022-09-09 00:00:00"
  horizon_days: 6
  history_days: 7
  validation_days: 1
  zones:
    - "102"
  forecast_model: "timesfm"
  timesfm_repo: "google/timesfm-2.5-200m-pytorch"
  timesfm_context_hours: 168
  timesfm_step_horizon: 24
  timesfm_exog_cols:
    - "T"
    - "U"
    - "nRAIN"
    - "e_price"
    - "is_weekend"
    - "temp_price_idx"
  timesfm_diurnal_blend_alpha: 0.0
  timesfm_roll_actuals: true
  seasonal_diurnal_blend_alpha: 0.0
  chronos_repo: "amazon/chronos-2"
  chronos_context_hours: 512
  chronos_step_horizon: 24
  chronos_diurnal_blend_alpha: 0.0
  chronos_device: "auto"
  chronos_roll_actuals: true
  lstm_context_hours: 24
  lstm_step_horizon: 24
  lstm_exog_cols:
    - "T"
    - "U"
    - "nRAIN"
    - "e_price"
    - "is_weekend"
    - "temp_price_idx"
  lstm_hidden_size: 64
  lstm_num_layers: 1
  lstm_epochs: 50
  lstm_learning_rate: 0.001
  lstm_batch_size: 32
  lstm_diurnal_blend_alpha: 0.0
  lstm_device: "auto"
  lstm_roll_actuals: true
  lstm_seed: 42
  temperature: 0.2
